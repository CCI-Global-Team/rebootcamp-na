version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm@10.18.2
        - pnpm config set ignore-scripts false
        - pnpm install
    build:
      commands:
        - NEXT_DISABLE_TURBOPACK=1 pnpm build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .pnpm-store/**/*
      - node_modules/**/*
